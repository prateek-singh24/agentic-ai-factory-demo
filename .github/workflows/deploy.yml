name: Deploy To Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git clone https://prateek-singh24:$HF_TOKEN@huggingface.co/spaces/prateek-singh24/agentic-ai-factory-demo hf_space

          rsync -av --exclude='.git' ./ hf_space/

          cd hf_space

          git add .

          git commit -m "Auto deploy from GitHub" || echo "No changes to commit"

          git push